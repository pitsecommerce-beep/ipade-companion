# Railway se conecta directamente a este repositorio y despliega
# automáticamente en cada push a main — no se necesita un workflow de CI/CD.
#
# Este archivo existe solo como documentación. Si Railway pierde la
# conexión al repo, reconéctalo en:
#   railway.app → tu proyecto → Settings → Source → Connect Repo
#
# Variables de entorno que debes configurar en Railway → Variables:
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   ANTHROPIC_API_KEY
#   RESEND_API_KEY         (opcional — habilita correos recordatorio)
#   RESEND_FROM_EMAIL      (opcional — dirección de origen)
