name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos necesarios para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue concurrente.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Conexión pública a Supabase. Se leen de los Actions Secrets
          # (Settings → Secrets and variables → Actions → Secrets).
          # La URL y el anon key son valores públicos (acaban embebidos en el
          # sitio estático), pero se guardan como Secrets por consistencia.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # ⚠️ NUNCA agregues aquí ANTHROPIC_API_KEY ni ninguna otra llave secreta:
          # este build genera un sitio estático y cualquier variable VITE_* queda
          # embebida en el JavaScript público. La API key de Anthropic se maneja
          # sólo en el workflow deploy-supabase.yml (→ secret de la Edge Function).
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
